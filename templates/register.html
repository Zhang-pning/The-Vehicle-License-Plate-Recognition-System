<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static',filename='favicon.ico') }}" type="image/x-icon">
    <title>注册 - 车牌识别系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <h1>创建新账号</h1>
            <p>REGISTER NEW ACCOUNT</p>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="数字和字母组合" required>
                </div>
                <div class="error-message" id="usernameError"></div>
                <div class="info-text">用户名只能包含数字和字母,区分大小写</div>
                <div class="success-message" id="usernameSuccess">✓ 该用户名可以使用</div>
            </div>
            <div class="form-group">
                <label for="password">密码 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <div class="password-strength" id="passwordStrength" style="display: none;">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <span id="strengthText"></span>
                </div>
                <div class="error-message" id="passwordError"></div>
                <div class="info-text">密码可包含数字、字母或特殊字符,长度8-20位</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
                </div>
                <div class="error-message" id="confirmPasswordError"></div>
                <div class="success-message" id="confirmPasswordSuccess">✓ 两次密码一致</div>
            </div>
            <div class="form-group">
                <label for="userType">用户类型 <span>*</span></label>
                <select id="userType" required>
                    <option value="normal">普通用户</option>
                    <option value="admin">管理员</option>
                </select>
            </div>
            <div class="form-group admin-key-group" id="adminKeyGroup">
                <label for="adminKey">管理密钥 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="adminKey" placeholder="请输入管理密钥">
                </div>
                <div class="error-message" id="adminKeyError"></div>
            </div>
            <div class="form-group">
                <label for="email">邮箱 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="error-message" id="emailError"></div>
                <div class="success-message" id="emailSuccess">✓ 该邮箱可以使用</div>
            </div>
            <div class="form-group">
                <label for="verificationCode">验证码 <span>*</span></label>
                <div class="verification-wrapper">
                    <input type="text" id="verificationCode" placeholder="请输入验证码" required>
                    <button type="button" class="send-code-btn" id="sendCodeBtn">获取验证码</button>
                </div>
                <div class="error-message" id="codeError"></div>
                <div class="info-text">验证码将发送到您的邮箱,请注意查收</div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">
                    我已阅读并同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
                </label>
            </div>
            <button type="submit">
                <span>注册</span>
            </button>
        </form>
        <div class="login-link">
            已有账号? <a href="/login">立即登录</a>
        </div>
    </div>
    <script src="{{ url_for('static',filename='js/register.js') }}"></script>
</body>
</html>
